version: "3.8"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexuspulse-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    networks:
      - nexuspulse-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexuspulse-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - nexuspulse-network
    restart: unless-stopped

networks:
  nexuspulse-network:
    driver: bridge